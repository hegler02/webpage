<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>학교 규정집 지식봇 강의 30장</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="slides.js" defer></script>
  <script src="deck.js" defer></script>
</head>
<body>
<main class="stage">
    <section class="deck" id="deck" aria-label="학교 규정집 지식봇 강의 30장">
      <div class="hud" aria-hidden="true">
        <div>Knowledge Blocks</div>
        <div class="center">Knowledge Bot Lecture</div>
        <div class="right" id="chapterLabel">01 — Scatter</div>
      </div>
      <div class="hud-line"></div>
      <div class="progress" id="progress"></div>
      <div class="side-title" id="sideTitle">업무별 지식파일을 조립한다</div>

      <div class="viewport">
        <div class="copy" id="copy"></div>
        <div class="brick-zone" aria-hidden="true">
          <div class="baseplate"></div>
          <div class="snap-flash"></div>
          <div id="bricks"></div>
        </div>
      </div>

      <nav class="controls" aria-label="슬라이드 이동">
        <button id="prevBtn" type="button" aria-label="이전 슬라이드">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="page-number" id="pageNumber">01 / 30</span>
        <button id="nextBtn" type="button" aria-label="다음 슬라이드">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </nav>
      <div class="help">김준호 동서울대학교 교수 / 사)한국고등직업교육학회 부회장</div>
    </section>
  </main>
</body>
</html>
