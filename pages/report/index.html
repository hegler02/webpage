<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editorial Magazine Deck</title>
  <link rel="stylesheet" href="tokens.css?v=7">
  <link rel="stylesheet" href="styles.css?v=7">
  <script src="slides.js?v=7" defer></script>
  <script src="deck.js?v=7" defer></script>
</head>
<body>
  <main class="magazine" id="deck">
    <div class="paper-shadow" aria-hidden="true"></div>
    <header class="masthead" aria-hidden="true">
      <div class="brand" id="brand"></div>
      <div class="issue" id="issue"></div>
      <div class="folio" id="folio"></div>
    </header>

    <section class="spread" id="spread" aria-live="polite"></section>

    <footer class="bottom-bar">
      <div class="toc" id="toc"></div>
      <nav class="nav" id="navigation">
        <button id="prevBtn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button id="nextBtn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </nav>
    </footer>
  </main>
</body>
</html>
